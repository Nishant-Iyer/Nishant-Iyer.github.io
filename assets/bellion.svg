<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="100%" stop-color="#0f0f0f" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)" />
  <rect width="100%" height="100%" fill="url(#grid)" />
  
  <!-- Center Graphic -->
  <g transform="translate(400, 170)">
    <!-- Outer rings -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.3" stroke-dasharray="4 8"/>
    <circle cx="0" cy="0" r="90" fill="none" stroke="url(#accent)" stroke-width="2" filter="url(#glow)" opacity="0.6"/>
    
    <!-- Hexagon -->
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" fill="none" stroke="url(#accent)" stroke-width="4" filter="url(#glow)"/>
    <polygon points="0,-45 39,-22.5 39,22.5 0,45 -39,22.5 -39,-22.5" fill="rgba(0, 212, 255, 0.05)" stroke="#00d4ff" stroke-width="1"/>
    
    <!-- Inner Nodes -->
    <circle cx="0" cy="0" r="16" fill="#a855f7" filter="url(#glow)"/>
    <circle cx="0" cy="-60" r="6" fill="#00d4ff" filter="url(#glow)"/>
    <circle cx="52" cy="-30" r="6" fill="#00d4ff" />
    <circle cx="52" cy="30" r="6" fill="#00d4ff" />
    <circle cx="0" cy="60" r="6" fill="#00d4ff" />
    <circle cx="-52" cy="30" r="6" fill="#00d4ff" />
    <circle cx="-52" cy="-30" r="6" fill="#00d4ff" />
    
    <!-- Connecting Lines -->
    <line x1="0" y1="-16" x2="0" y2="-60" stroke="url(#accent)" stroke-width="2" opacity="0.8"/>
    <line x1="14" y1="-8" x2="52" y2="-30" stroke="url(#accent)" stroke-width="2" opacity="0.8"/>
    <line x1="14" y1="8" x2="52" y2="30" stroke="url(#accent)" stroke-width="2" opacity="0.8"/>
    <line x1="0" y1="16" x2="0" y2="60" stroke="url(#accent)" stroke-width="2" opacity="0.8"/>
    <line x1="-14" y1="8" x2="-52" y2="30" stroke="url(#accent)" stroke-width="2" opacity="0.8"/>
    <line x1="-14" y1="-8" x2="-52" y2="-30" stroke="url(#accent)" stroke-width="2" opacity="0.8"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="340" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="6">BELLION</text>
  <text x="400" y="365" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#a3a3a3" text-anchor="middle" letter-spacing="3">ZERO-TRUST FINANCIAL AGENT</text>
</svg>
